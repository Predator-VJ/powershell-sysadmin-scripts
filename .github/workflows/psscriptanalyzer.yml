name: PSScriptAnalyzer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Static analysis
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module PSScriptAnalyzer
          (Get-Module PSScriptAnalyzer).Version | Write-Host

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path . `
            -Recurse `
            -Settings ./PSScriptAnalyzerSettings.psd1

          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            $errors   = @($results | Where-Object Severity -eq 'Error')
            $warnings = @($results | Where-Object Severity -eq 'Warning')
            Write-Host ""
            Write-Host "Errors:   $($errors.Count)"
            Write-Host "Warnings: $($warnings.Count)"
            if ($errors.Count -gt 0) {
              throw "PSScriptAnalyzer found $($errors.Count) error(s)."
            }
          } else {
            Write-Host "PSScriptAnalyzer: clean."
          }
